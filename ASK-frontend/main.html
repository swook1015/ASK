    <style>
        .content-container {
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            padding: 20px;
        }

        .breadcrumbs {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto 20px auto;
        }

        .nav-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 40px;
            width: 100%;
            max-width: 1100px;
            min-height: 550px;
            justify-content: center;
            padding: 80px 40px;
            margin: auto;
        }

        .nav-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
            width: 100%;
            max-width: 1200px;
            margin: auto;
        }

        .nav-card {
            background: #ffffff;
            border: 1px solid #ddd;
            border-radius: 24px;

            min-height: 550px;
            padding: 80px 40px;

            text-align: center;
            text-decoration: none;
            color: #1d1d1f;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);

            display: flex;
            flex-direction: column;

            justify-content: center;
            align-items: center;

            box-sizing: border-box;
        }


        .nav-card:hover {
            transform: translateY(-15px);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.15);
        }


        .nav-card i {
            font-size: 4rem;
            margin-bottom: 50px;
            color: #333;
        }

        .nav-card h2 {
            font-size: 1.7rem;
            margin-bottom: 20px;
            font-weight: 800;
        }

        .nav-card p {
            font-size: 1rem;
            color: #666;
            line-height: 1.6;
            max-width: 220px;
        }


        @media (max-width: 768px) {
            .content-container {
                min-height: auto;
                padding: 20px;
            }

            .nav-grid {
                grid-template-columns: 1fr;
                gap: 15px;
                margin: 20px auto;
            }

            .nav-card {
                min-height: 160px;
                padding: 20px;
                border-radius: 15px;

            }

            .nav-card i {
                font-size: 2.2rem;
                margin-bottom: 10px;

            }

            .nav-card h2 {
                font-size: 1.2rem;
                margin: 5px 0;
            }

            .nav-card p {
                font-size: 0.85rem;
                max-width: 100%;
                line-height: 1.3;
            }
        }
    </style>
</head>
