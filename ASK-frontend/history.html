<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>History - RISK WATCH AI</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <header>
        <div class="header-container">
            <button id="menu-btn" class="hamburger-left"><i class="fas fa-bars"></i></button>
            <div class="logo">RISK-WATCH AI</div>
            <div class="header-empty"></div>
        </div>
    </header>

    <nav id="side-nav" class="side-nav">
        <div class="nav-header">
            <span class="nav-title">Menu</span>
            <button id="close-btn" class="close-btn"><i class="fas fa-times"></i></button>
        </div>
        <ul>
            <li><a href="main.html"><i class="fas fa-house"></i> 홈</a></li>
            <li><a href="index.html"><i class="fas fa-desktop"></i> 대시보드</a></li>
            <li><a href="intro.html"><i class="fas fa-info-circle"></i> 서비스 소개</a></li>
            <li><a href="history.html" class="active"><i class="fas fa-history"></i> 과거 데이터</a></li>
        </ul>
    </nav>
    <div id="overlay" class="overlay"></div>

    <section class="breadcrumbs">
        <div class="breadcrumb-inner">
            <a href="main.html">홈</a> > <span class="current">과거 데이터</span>
        </div>
    </section>

    <main class="content-container">
        <div class="history-grid">
        <section class="history-left">
            <div class="section-header">
                <h3><i class="fas fa-list"></i> 상세 이력 로그</h3>
                <button onclick="localStorage.removeItem('risk_logs'); location.reload();" class="btn-clear">초기화</button>
            </div>
            
            <div class="table-wrapper box-style">
                <table>
                    <thead>
                        <tr>
                            <th>일시</th>
                            <th>등급</th>
                            <th>내용</th>
                        </tr>
                    </thead>
                    <tbody id="history-body">
                        </tbody>
                </table>
            </div>
            
            <div id="pagination" class="pagination-container"></div>
        </section>

        <section class="history-right">
            <div class="section-header">
                <h3><i class="fas fa-chart-bar"></i> 날짜별 통계</h3>
            </div>
            
            <div class="graph-wrapper box-style">
                <canvas id="riskChart"></canvas>
            </div>
        </section>
        </div>
    </main>

    <footer>
        <div class="footer-container">
            <div class="footer-left">
                <h2 class="footer-logo">RISK-WATCH AI</h2>
                <p class="footer-desc">실시간 위험 감지 및 관제 시스템</p>
                <div class="footer-detail">
                    <span><strong>Developer</strong> 최인하</span>
                    <span class="divider">|</span>
                    <span><strong>Contact</strong> inha_contact@example.com</span>
                </div>
            </div>
            <div class="footer-right">
                <div class="footer-links">
                    <a href="https://github.com/inha0307" target="_blank">
                        <i class="fab fa-github"></i> GitHub @inha0307
                    </a>
                </div>
                <p class="copyright">&copy; 2026 RISK-WATCH AI. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
