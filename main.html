<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RISK-WATCH AI | HOME</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* [수정] 메인 콘텐츠 영역을 화면 높이에 맞게 설정 */
        .content-container {
            display: flex;
            flex-direction: column;
            /* 헤더와 푸터의 높이를 제외한 최소 높이 설정 (브라우저 환경에 따라 조절 가능) */
            box-sizing: border-box;
            padding: 20px;
        }

        /* [추가] 브레드크럼은 상단에 고정 */
        .breadcrumbs {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto 20px auto;
        }

        /* [수정] 가로 정렬 컨테이너를 부모의 중앙으로 배치 */
        .nav-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 40px;
            /* 너무 넓은 간격(100px)을 적절히 조정했습니다 */
            width: 100%;
            max-width: 1100px;
            /* [핵심] 높이 설정: 최소 높이를 500px 이상으로 설정 */
            min-height: 550px;
            /* [핵심] 상하 여백 확대: 내부 콘텐츠가 너무 붙지 않게 조정 */
            /* [핵심] 내부 요소들을 세로축 중앙에 균형 있게 배치 */
            justify-content: center;
            padding: 80px 40px;
            margin: auto;
            /* 상하 여백을 자동으로 두어 수직 중앙 정렬 */
        }

        .nav-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
            width: 100%;
            max-width: 1200px;
            /* 전체 가로 폭은 유지 혹은 약간 확장 */
            margin: auto;
            /* 수직 중앙 정렬 유지 */
        }

        /* 카드 스타일 수정 */
        .nav-card {
            background: #ffffff;
            border: 1px solid #ddd;
            border-radius: 24px;

            /* [핵심] 높이 설정: 최소 높이를 500px 이상으로 설정 */
            min-height: 550px;
            /* [핵심] 상하 여백 확대: 내부 콘텐츠가 너무 붙지 않게 조정 */
            padding: 80px 40px;

            text-align: center;
            text-decoration: none;
            color: #1d1d1f;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);

            display: flex;
            flex-direction: column;
            /* [핵심] 내부 요소들을 세로축 중앙에 균형 있게 배치 */
            justify-content: center;
            align-items: center;

            box-sizing: border-box;
        }

        /* 마우스 호버 시 더 역동적인 느낌 부여 */
        .nav-card:hover {
            transform: translateY(-15px);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.15);
        }

        /* 아이콘 및 텍스트 간격 조정 */
        .nav-card i {
            font-size: 4rem;
            margin-bottom: 50px;
            /* 아이콘 아래 공간 확보 */
            color: #333;
        }

        .nav-card h2 {
            font-size: 1.7rem;
            margin-bottom: 20px;
            font-weight: 800;
        }

        .nav-card p {
            font-size: 1rem;
            color: #666;
            line-height: 1.6;
            max-width: 220px;
            /* 텍스트가 너무 길게 퍼지지 않도록 폭 제한 */
        }

        /* 모바일 최적화 */
        @media (max-width: 768px) {
            .content-container {
                min-height: auto;
                padding: 20px;
                /* 전체 여백 감소 */
            }

            .nav-grid {
                grid-template-columns: 1fr;
                /* 세로 1열 유지 */
                gap: 15px;
                /* 카드 사이 간격 축소 */
                margin: 20px auto;
            }

            .nav-card {
                /* [핵심] 높이를 확 줄임 (기존 550px -> 160px) */
                min-height: 160px;
                padding: 20px;
                /* 내부 여백 축소 */
                border-radius: 15px;
                /* 모바일에 어울리는 둥근 모서리 */

                /* [선택] 가로 정렬로 변경하고 싶다면 아래 주석 해제 */
                /* flex-direction: row; 
                justify-content: flex-start; 
                text-align: left; 
                gap: 20px; */
            }

            .nav-card i {
                font-size: 2.2rem;
                /* 아이콘 크기 축소 */
                margin-bottom: 10px;
                /* 간격 축소 */
            }

            .nav-card h2 {
                font-size: 1.2rem;
                /* 제목 크기 축소 */
                margin: 5px 0;
            }

            .nav-card p {
                font-size: 0.85rem;
                /* 설명글 크기 축소 */
                max-width: 100%;
                /* 텍스트 폭 제한 해제 */
                line-height: 1.3;
            }
        }
    </style>
</head>
